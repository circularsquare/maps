<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CROPGRIDS — Global Crop Production</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  #legend {
    position: absolute; top: 10px; right: 10px; z-index: 1;
    background: white; border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    max-height: calc(100vh - 40px);
    width: 220px;
    display: flex; flex-direction: column;
  }
  #legend-header {
    padding: 10px 14px 0;
    flex-shrink: 0;
  }
  #legend-header h3 { margin: 0 0 8px 0; font-size: 13px; }
  .legend-buttons { display: flex; gap: 6px; margin-bottom: 8px; }
  .legend-buttons button {
    flex: 1; font-size: 11px; padding: 3px 0; cursor: pointer;
    border: 1px solid #ccc; border-radius: 3px; background: #f8f8f8;
  }
  .legend-buttons button:hover { background: #eee; }
  .slider-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px; font-size: 11px; color: #666;
  }
  .slider-row label { flex-shrink: 0; }
  .slider-row input[type="range"] { flex: 1; height: 14px; cursor: pointer; }

  #legend-scroll {
    overflow-y: auto; padding: 0 14px 10px;
    flex: 1; min-height: 0;
  }

  /* Group collapsible */
  details.legend-group { margin-top: 4px; }
  details.legend-group:first-child { margin-top: 0; }
  summary.legend-group-header {
    list-style: none;
    display: flex; align-items: center;
    font-size: 11px; font-weight: bold;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: #666; cursor: pointer;
    padding: 5px 0 2px;
    border-top: 1px solid #ddd;
    user-select: none;
  }
  details.legend-group:first-child > summary.legend-group-header { border-top: none; }
  summary.legend-group-header::-webkit-details-marker { display: none; }
  summary.legend-group-header::after {
    content: '\25B6'; font-size: 9px; color: #999;
    margin-left: 6px; display: inline-block; width: 12px;
    text-align: center; flex-shrink: 0;
  }
  details[open] > summary.legend-group-header::after {
    transform: rotate(90deg);
  }
  .group-indicator {
    margin-right: 6px; flex-shrink: 0; cursor: pointer;
  }
  .group-swatch {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0; margin-right: 5px;
  }
  .group-label { flex: 1; }
  .group-count { color: #999; font-size: 10px; margin-left: 4px; }

  /* Individual crop entries */
  .legend-entry {
    display: flex; align-items: center; gap: 5px;
    padding: 2px 0 2px 22px; font-size: 12px;
    user-select: none;
  }
  .legend-entry input[type="checkbox"] { flex-shrink: 0; cursor: pointer; }
  .legend-swatch {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-name { flex: 1; }
  .legend-count { color: #999; font-size: 11px; }

  #status {
    position: absolute; bottom: 10px; left: 10px; z-index: 1;
    background: white; padding: 6px 12px; border-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    font-size: 12px; color: #666;
  }

  /* Tooltip popup */
  .maplibregl-popup-content {
    background: #333; color: #fff; padding: 4px 8px;
    border-radius: 4px; font-size: 12px; font-family: system-ui, sans-serif;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .maplibregl-popup-tip { border-top-color: #333; }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <div id="legend-header">
    <h3>Crops (1 dot = 10,000 ha)</h3>
    <div class="legend-buttons">
      <button id="show-all">Show all</button>
      <button id="hide-all">Hide all</button>
    </div>
    <div class="slider-row">
      <label>Dot size</label>
      <input type="range" id="dot-size" min="0" max="100" value="50">
    </div>
  </div>
  <div id="legend-scroll"></div>
</div>
<div id="status">Loading...</div>
<script>
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      "carto": {
        type: "raster",
        tiles: ["https://basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}@2x.png"],
        tileSize: 256,
        attribution: "&copy; OpenStreetMap &copy; CARTO"
      }
    },
    layers: [{ id: "carto", type: "raster", source: "carto" }]
  },
  center: [20, 30],
  zoom: 2,
  maxZoom: 12,
});

const statusEl = document.getElementById("status");
const legendScrollEl = document.getElementById("legend-scroll");

let legend = [];
let visible = new Set();
let dotScale = 1.0; // multiplier from slider

// Rename NES -> Other, clean up display names
function displayName(name) {
  return name
    .replace(/^Cereals NES$/, "Other Cereals")
    .replace(/^Oilseeds NES$/, "Other Oilseeds")
    .replace(/^Pulses NES$/, "Other Pulses")
    .replace(/^Legumes NES$/, "Other Legumes")
    .replace(/^Roots NES$/, "Other Roots")
    .replace(/^Fruit NES$/, "Other Fruit")
    .replace(/^Tropical Fruit NES$/, "Other Tropical Fruit")
    .replace(/^Stone Fruit NES$/, "Other Stone Fruit")
    .replace(/^Berries NES$/, "Other Berries")
    .replace(/^Citrus NES$/, "Other Citrus")
    .replace(/^Vegetables NES$/, "Other Vegetables")
    .replace(/^Nuts NES$/, "Other Nuts")
    .replace(/^Spices NES$/, "Other Spices")
    .replace(/^Fibre NES$/, "Other Fibre")
    .replace(/^Fodder NES$/, "Other Fodder")
    .replace(/^Grass NES$/, "Other Grass")
    .replace(/^Sugar NES$/, "Other Sugar");
}

// Crop groupings — hue is center color (degrees), hue_range spreads members around it
const GROUPS = {
  cereals: {
    label: "Cereals & Grains", hue: 45, sat: 0.70, lit: 0.50, hue_range: 30,
    codes: ["wheat","rice","maize","barley","sorghum","millet","oats","rye","buckwheat",
            "triticale","fonio","quinoa","mixedgrain","cerealnes","popcorn","greencorn"]
  },
  oilseeds: {
    label: "Oilseeds", hue: 85, sat: 0.55, lit: 0.45, hue_range: 30,
    codes: ["soybean","rapeseed","sunflower","groundnut","sesame","oilpalm","coconut",
            "linseed","castor","safflower","olive","oilseednes","mustard","hempseed",
            "poppy","melonseed","tung","kapokseed"]
  },
  pulses: {
    label: "Pulses & Legumes", hue: 155, sat: 0.55, lit: 0.45, hue_range: 25,
    codes: ["bean","chickpea","cowpea","lentil","pigeonpea","pea","broadbean",
            "greenpea","greenbean","greenbroadbean","lupin","bambara",
            "stringbean","pulsenes","legumenes"]
  },
  roots: {
    label: "Roots & Tubers", hue: 25, sat: 0.60, lit: 0.45, hue_range: 20,
    codes: ["cassava","potato","sweetpotato","yam","taro","rootnes","yautia",
            "beet","swede","turnip"]
  },
  fruits: {
    label: "Fruits", hue: 340, sat: 0.65, lit: 0.55, hue_range: 35,
    codes: ["apple","banana","plantain","mango","grape","orange","tangetc",
            "lemonlime","grapefruitetc","citrusnes","cherry","sourcherry","plum",
            "peachetc","apricot","pear","fig","date","avocado","papaya",
            "pineapple","kiwi","persimmon","watermelon","melonetc","strawberry",
            "blueberry","cranberry","rasberry","currant","gooseberry","quince",
            "stonefruitnes","berrynes","fruitnes","tropicalnes","carob","cashewapple"]
  },
  vegetables: {
    label: "Vegetables", hue: 120, sat: 0.50, lit: 0.40, hue_range: 25,
    codes: ["cabbage","cauliflower","tomato","onion","garlic","greenonion",
            "carrot","lettuce","spinach","eggplant","okra","cucumberetc",
            "pumpkinetc","chilleetc","artichoke","asparagus","mushroom","vegetablenes",
            "vegfor"]
  },
  nuts: {
    label: "Nuts", hue: 30, sat: 0.50, lit: 0.40, hue_range: 20,
    codes: ["almond","cashew","hazelnut","walnut","pistachio","chestnut",
            "kolanut","karite","brazil","areca","nutnes"]
  },
  stimulants: {
    label: "Stimulants & Spices", hue: 280, sat: 0.50, lit: 0.55, hue_range: 30,
    codes: ["coffee","tea","cocoa","tobacco","cinnamon","clove","nutmeg",
            "pepper","pimento","vanilla","ginger","aniseetc","peppermint",
            "spicenes","mate","hop"]
  },
  sugar: {
    label: "Sugar Crops", hue: 195, sat: 0.60, lit: 0.50, hue_range: 15,
    codes: ["sugarcane","sugarbeet","sugarnes"]
  },
  fibre: {
    label: "Fibre & Industrial", hue: 220, sat: 0.55, lit: 0.50, hue_range: 25,
    codes: ["cotton","rubber","jute","flax","hemp","sisal","abaca","agave",
            "ramie","kapokfiber","jutelikefiber","fibrenes"]
  },
  fodder: {
    label: "Fodder & Forage", hue: 70, sat: 0.40, lit: 0.50, hue_range: 25,
    codes: ["alfalfa","clover","mixedgrass","grassnes",
            "fornes","canaryseed","vetch","pyrethrum"]
  },
};

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function assignGroupColors() {
  for (const group of Object.values(GROUPS)) {
    const codes = group.codes.filter(c => cropByCode[c]);
    const n = codes.length;
    for (let i = 0; i < n; i++) {
      const offset = n > 1 ? (i / (n - 1) - 0.5) * group.hue_range : 0;
      cropByCode[codes[i]].color = hslToHex(group.hue + offset, group.sat, group.lit);
    }
  }
}
const GROUP_ORDER = ["cereals","oilseeds","pulses","roots","fruits","vegetables","nuts","stimulants","sugar","fibre","fodder"];

// Build lookup: code -> crop object
let cropByCode = {};
// Build lookup: code -> group key
let groupOfCrop = {};

// Dot size: base radii * 1.5, slider goes from 0.5x to 2x of that
const BASE_RADII = [2, 2.25, 4.5, 18]; // at zoom 2, 6, 10 (already 1.5x of original)
function dotSizeExpr() {
  return ["interpolate", ["exponential", 2], ["zoom"],
    2, BASE_RADII[0] * dotScale,
    6, BASE_RADII[1] * dotScale,
    10, BASE_RADII[2] * dotScale];
}

function updateFilter() {
  if (!map.getSource("crops")) return;
  const checked = [...visible];
  map.setPaintProperty("crop-dots", "circle-opacity",
    ["case", ["in", ["get", "crop"], ["literal", checked]], 0.75, 0]
  );
  // update checkbox states
  document.querySelectorAll('#legend-scroll input[data-code]').forEach(cb => {
    cb.checked = visible.has(cb.dataset.code);
  });
  // update group indicator checkboxes
  for (const key of GROUP_ORDER) {
    const codes = GROUPS[key].codes.filter(c => cropByCode[c]);
    const allOn = codes.every(c => visible.has(c));
    const noneOn = codes.every(c => !visible.has(c));
    const groupCb = document.querySelector(`.group-indicator[data-group="${key}"]`);
    if (groupCb) {
      groupCb.checked = allOn;
      groupCb.indeterminate = !allOn && !noneOn;
    }
  }
}

function buildLegend() {
  let html = '';
  for (const key of GROUP_ORDER) {
    const group = GROUPS[key];
    const crops = group.codes.map(c => cropByCode[c]).filter(Boolean);
    if (!crops.length) continue;

    // Sort by dot count descending within group
    crops.sort((a, b) => b.dots - a.dots);

    const groupDots = crops.reduce((s, c) => s + c.dots, 0);
    const groupColor = hslToHex(group.hue, group.sat, group.lit);

    html += `<details class="legend-group">`;
    html += `<summary class="legend-group-header">`;
    html += `<input type="checkbox" class="group-indicator" data-group="${key}" checked>`;
    html += `<div class="group-swatch" style="background:${groupColor}"></div>`;
    html += `<span class="group-label">${group.label}</span>`;
    html += `<span class="group-count">${groupDots.toLocaleString()}</span>`;
    html += `</summary>`;

    for (const crop of crops) {
      visible.add(crop.code);
      const name = displayName(crop.name);
      html += `<div class="legend-entry">`;
      html += `<input type="checkbox" data-code="${crop.code}" data-group="${key}" checked>`;
      html += `<div class="legend-swatch" style="background:${crop.color}"></div>`;
      html += `<span class="legend-name">${name}</span>`;
      html += `<span class="legend-count">${crop.dots.toLocaleString()}</span>`;
      html += `</div>`;
    }
    html += `</details>`;
  }
  legendScrollEl.innerHTML = html;

  // Event delegation for checkboxes
  legendScrollEl.addEventListener('change', e => {
    const cb = e.target;
    if (!cb.matches('input[type="checkbox"]')) return;
    if (cb.classList.contains('group-indicator')) {
      const key = cb.dataset.group;
      const codes = GROUPS[key].codes.filter(c => cropByCode[c]);
      codes.forEach(c => cb.checked ? visible.add(c) : visible.delete(c));
      legendScrollEl.querySelectorAll(`input[data-group="${key}"]:not(.group-indicator)`)
        .forEach(child => child.checked = cb.checked);
      updateFilter();
    } else {
      cb.checked ? visible.add(cb.dataset.code) : visible.delete(cb.dataset.code);
      updateFilter();
    }
  });
}

async function loadData() {
  const legendResp = await fetch("data/legend.json");
  legend = await legendResp.json();

  // Build lookups
  legend.forEach(c => {
    cropByCode[c.code] = c;
  });
  for (const [key, group] of Object.entries(GROUPS)) {
    group.codes.forEach(c => { groupOfCrop[c] = key; });
  }

  // Assign HSL-spread colors per group
  assignGroupColors();

  // Load binary
  statusEl.textContent = "Loading dots...";
  const resp = await fetch("data/all_dots.bin");
  const buf = await resp.arrayBuffer();
  const view = new DataView(buf);
  const recordSize = 10; // float32 lon + float32 lat + uint16 crop_id
  const n = Math.floor(buf.byteLength / recordSize);

  const features = [];
  for (let i = 0; i < n; i++) {
    const offset = i * recordSize;
    const lon = view.getFloat32(offset, true);
    const lat = view.getFloat32(offset + 4, true);
    const cropIdx = view.getUint16(offset + 8, true);
    features.push({
      type: "Feature",
      geometry: { type: "Point", coordinates: [lon, lat] },
      properties: { crop: legend[cropIdx].code, name: displayName(legend[cropIdx].name) }
    });
  }

  const geojson = { type: "FeatureCollection", features };

  // Build color expression
  const colorExpr = ["match", ["get", "crop"]];
  legend.forEach(c => { colorExpr.push(c.code, c.color); });
  colorExpr.push("#888");

  map.addSource("crops", { type: "geojson", data: geojson });
  map.addLayer({
    id: "crop-dots",
    type: "circle",
    source: "crops",
    paint: {
      "circle-radius": dotSizeExpr(),
      "circle-color": colorExpr,
      "circle-opacity": 0.75,
    }
  });

  buildLegend();

  // Dot size slider
  const slider = document.getElementById("dot-size");
  slider.addEventListener("input", () => {
    // slider 0-100, 50 = 1x. Map: 0->0.5, 50->1.0, 100->2.0
    const v = slider.value / 100;
    dotScale = v < 0.5 ? 0.5 + v : v * 2;
    map.setPaintProperty("crop-dots", "circle-radius", dotSizeExpr());
  });

  // Tooltip
  const tooltip = new maplibregl.Popup({
    closeButton: false,
    closeOnClick: false,
    offset: 8,
  });

  map.on('mousemove', 'crop-dots', e => {
    const feature = e.features[0];
    if (!visible.has(feature.properties.crop)) {
      tooltip.remove();
      return;
    }
    tooltip.setLngLat(feature.geometry.coordinates)
      .setHTML(feature.properties.name)
      .addTo(map);
  });

  map.on('mouseleave', 'crop-dots', () => {
    tooltip.remove();
  });

  // Show all / hide all
  document.getElementById("show-all").addEventListener("click", () => {
    legend.forEach(c => visible.add(c.code));
    updateFilter();
  });
  document.getElementById("hide-all").addEventListener("click", () => {
    visible.clear();
    updateFilter();
  });

  statusEl.textContent = `${n.toLocaleString()} dots across ${legend.length} crops (1 dot = 10,000 ha harvested)`;
}

map.on("load", loadData);
</script>
</body>
</html>
